<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part A - Rhodonea Curve Flower</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background: white;
            cursor: pointer;
        }
        .info {
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas" width="800" height="800"></canvas>
    <div class="info">Click on the canvas to change petal arrangement and color</div>

    <script>
        // Vertex shader
        const vsSource = `
            attribute vec2 aPosition;
            uniform int uClickCount;
            
            void main() {
                gl_Position = vec4(aPosition, 0.0, 1.0);
                gl_PointSize = 2.0;
            }
        `;

        // Fragment shader
        const fsSource = `
            precision mediump float;
            uniform int uClickCount;
            
            void main() {
                // Alternate between green and red based on click count
                if (mod(float(uClickCount), 2.0) == 0.0) {
                    gl_FragColor = vec4(0.0, 0.8, 0.2, 1.0); // Green
                } else {
                    gl_FragColor = vec4(0.9, 0.1, 0.1, 1.0); // Red
                }
            }
        `;

        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported');
        }

        // Compile shader
        function compileShader(gl, source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        // Program
        const vertexShader = compileShader(gl, vsSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(gl, fsSource, gl.FRAGMENT_SHADER);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        gl.useProgram(program);

        // Get attribute and uniform locations
        const aPosition = gl.getAttribLocation(program, 'aPosition');
        const uClickCount = gl.getUniformLocation(program, 'uClickCount');

        // Create buffer
        const vertexBuffer = gl.createBuffer();

        let clickCount = 0;

        // Generate Rhodonea curve vertices
        function generateRhodonea(n, d) {
            const vertices = [];
            const numPoints = 5000;
            const k = n / d;
            
            for (let i = 0; i <= numPoints; i++) {
                const theta = (i / numPoints) * Math.PI * 2 * d;
                const r = Math.cos(k * theta) * 0.7;
                
                const x = r * Math.cos(theta);
                const y = r * Math.sin(theta);
                
                vertices.push(x, y);
            }
            
            return vertices;
        }

        // Different petal configurations
        const configurations = [
            { n: 5, d: 1 },   // 5 petals
            { n: 4, d: 1 },   // 4 petals
            { n: 3, d: 1 },   // 3 petals
            { n: 7, d: 1 },   // 7 petals
            { n: 8, d: 3 },   // Complex pattern
            { n: 5, d: 2 },   // 5 petals (different)
            { n: 6, d: 1 },   // 6 petals
            { n: 9, d: 4 }    // Complex pattern
        ];

        function draw() {
            gl.clearColor(1.0, 1.0, 1.0, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            const config = configurations[clickCount % configurations.length];
            const vertices = generateRhodonea(config.n, config.d);

            gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);

            gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(aPosition);

            gl.uniform1i(uClickCount, clickCount);

            gl.drawArrays(gl.POINTS, 0, vertices.length / 2);
        }

        // Mouse click event
        canvas.addEventListener('click', () => {
            clickCount++;
            draw();
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
