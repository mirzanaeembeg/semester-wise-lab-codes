<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part B - 2D Triangle Mesh Scene</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background: #87CEEB;
            cursor: pointer;
        }
        .info {
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas" width="800" height="800"></canvas>
    <div class="info">Press 'D' for day mode, 'N' for night mode, 'S' for sunset mode</div>

    <script>
        // Vertex shader with per-vertex color
        const vsSource = `
            attribute vec2 aPosition;
            attribute vec3 aColor;
            varying vec3 vColor;
            
            void main() {
                gl_Position = vec4(aPosition, 0.0, 1.0);
                vColor = aColor;
            }
        `;

        // Fragment shader with GLSL control statement
        const fsSource = `
            precision mediump float;
            varying vec3 vColor;
            uniform int uMode; // 0: day, 1: night, 2: sunset
            
            void main() {
                vec3 finalColor = vColor;
                
                // Control statement: adjust color based on mode
                if (uMode == 1) {
                    // Night mode: darken colors significantly
                    finalColor = vColor * 0.3;
                    finalColor = clamp(finalColor, 0.0, 1.0);
                } else if (uMode == 2) {
                    // Sunset mode: add orange/red tint
                    finalColor = mix(vColor, vec3(1.0, 0.5, 0.2), 0.4);
                } else {
                    // Day mode: normal colors with slight brightness
                    finalColor = vColor * 1.1;
                    finalColor = clamp(finalColor, 0.0, 1.0);
                }
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported');
        }

        // Compile shader
        function compileShader(gl, source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        // Create program
        const vertexShader = compileShader(gl, vsSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(gl, fsSource, gl.FRAGMENT_SHADER);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        gl.useProgram(program);

        // Get locations
        const aPosition = gl.getAttribLocation(program, 'aPosition');
        const aColor = gl.getAttribLocation(program, 'aColor');
        const uMode = gl.getUniformLocation(program, 'uMode');

        let mode = 0; // 0: day, 1: night, 2: sunset

        
        // Total vertices: 60+ (meeting requirement of 45+)
        
        // Sun (TRIANGLE_FAN) - 12 vertices
        const sunVertices = [];
        const sunColors = [];
        const sunSegments = 12;
        sunVertices.push(0.7, 0.7); // center
        sunColors.push(1.0, 0.95, 0.0);
        
        for (let i = 0; i <= sunSegments; i++) {
            const angle = (i / sunSegments) * Math.PI * 2;
            sunVertices.push(0.7 + Math.cos(angle) * 0.12, 0.7 + Math.sin(angle) * 0.12);
            sunColors.push(1.0, 0.9, 0.0);
        }

        // House body (TRIANGLE_STRIP) - 4 vertices
        const houseBody = [
            -0.3, -0.1,    0.8, 0.6, 0.4,
            -0.3, -0.5,    0.7, 0.5, 0.3,
             0.1, -0.1,    0.9, 0.7, 0.5,
             0.1, -0.5,    0.8, 0.6, 0.4
        ];

        // House roof (TRIANGLES) - 3 vertices
        const houseRoof = [
            -0.35, -0.1,   0.7, 0.2, 0.2,
             0.15, -0.1,   0.8, 0.3, 0.3,
            -0.1,   0.2,   0.6, 0.1, 0.1
        ];

        // Door (TRIANGLE_STRIP) - 4 vertices
        const door = [
            -0.15, -0.5,   0.4, 0.2, 0.1,
            -0.15, -0.3,   0.5, 0.3, 0.15,
            -0.05, -0.5,   0.4, 0.2, 0.1,
            -0.05, -0.3,   0.5, 0.3, 0.15
        ];

        // Window (TRIANGLE_STRIP) - 4 vertices
        const window1 = [
            -0.25, -0.2,   0.6, 0.8, 1.0,
            -0.25, -0.3,   0.5, 0.7, 0.9,
            -0.18, -0.2,   0.6, 0.8, 1.0,
            -0.18, -0.3,   0.5, 0.7, 0.9
        ];

        // Ground (TRIANGLE_STRIP) - 4 vertices
        const ground = [
            -1.0, -0.5,    0.2, 0.6, 0.2,
            -1.0, -1.0,    0.15, 0.5, 0.15,
             1.0, -0.5,    0.25, 0.65, 0.25,
             1.0, -1.0,    0.2, 0.55, 0.2
        ];

        // Left Tree trunk (TRIANGLE_STRIP) - 4 vertices
        const tree1Trunk = [
            -0.7, -0.2,    0.4, 0.3, 0.1,
            -0.7, -0.5,    0.35, 0.25, 0.08,
            -0.65, -0.2,   0.4, 0.3, 0.1,
            -0.65, -0.5,   0.35, 0.25, 0.08
        ];

        // Left Tree foliage (TRIANGLES) - 9 vertices
        const tree1Leaves = [
            -0.8, -0.2,    0.1, 0.6, 0.1,
            -0.55, -0.2,   0.15, 0.65, 0.15,
            -0.675, 0.1,   0.0, 0.5, 0.0,
            
            -0.75, 0.0,    0.1, 0.55, 0.1,
            -0.6, 0.0,     0.15, 0.6, 0.15,
            -0.675, 0.25,  0.0, 0.45, 0.0,
            
            -0.72, 0.15,   0.12, 0.58, 0.12,
            -0.63, 0.15,   0.15, 0.62, 0.15,
            -0.675, 0.35,  0.0, 0.4, 0.0
        ];

        // Right Tree trunk (TRIANGLE_STRIP) - 4 vertices
        const tree2Trunk = [
            0.6, -0.3,     0.4, 0.3, 0.1,
            0.6, -0.5,     0.35, 0.25, 0.08,
            0.65, -0.3,    0.4, 0.3, 0.1,
            0.65, -0.5,    0.35, 0.25, 0.08
        ];

        // Right Tree foliage (TRIANGLES) - 6 vertices
        const tree2Leaves = [
            0.5, -0.3,     0.1, 0.65, 0.1,
            0.75, -0.3,    0.15, 0.7, 0.15,
            0.625, 0.0,    0.0, 0.5, 0.0,
            
            0.55, -0.05,   0.12, 0.6, 0.12,
            0.7, -0.05,    0.15, 0.65, 0.15,
            0.625, 0.2,    0.0, 0.45, 0.0
        ];

        // Mountains (TRIANGLES) - 6 vertices
        const mountains = [
            -1.0, -0.5,    0.5, 0.5, 0.5,
            -0.5, 0.3,     0.6, 0.6, 0.6,
            -0.2, -0.5,    0.55, 0.55, 0.55,
            
            0.0, -0.5,     0.5, 0.5, 0.5,
            0.4, 0.15,     0.65, 0.65, 0.65,
            0.8, -0.5,     0.55, 0.55, 0.55
        ];

        function createBuffer(data) {
            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.STATIC_DRAW);
            return buffer;
        }

        function drawScene() {
            gl.clearColor(0.53, 0.81, 0.92, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform1i(uMode, mode);

            // Draw mountains
            drawWithColors(mountains, 5, gl.TRIANGLES);

            // Draw ground
            drawWithColors(ground, 5, gl.TRIANGLE_STRIP);

            // Draw sun
            const sunData = [];
            for (let i = 0; i < sunVertices.length / 2; i++) {
                sunData.push(sunVertices[i * 2], sunVertices[i * 2 + 1], 
                            sunColors[i * 3], sunColors[i * 3 + 1], sunColors[i * 3 + 2]);
            }
            drawWithColors(sunData, 5, gl.TRIANGLE_FAN);

            // Draw trees
            drawWithColors(tree1Trunk, 5, gl.TRIANGLE_STRIP);
            drawWithColors(tree1Leaves, 5, gl.TRIANGLES);
            drawWithColors(tree2Trunk, 5, gl.TRIANGLE_STRIP);
            drawWithColors(tree2Leaves, 5, gl.TRIANGLES);

            // Draw house
            drawWithColors(houseBody, 5, gl.TRIANGLE_STRIP);
            drawWithColors(houseRoof, 5, gl.TRIANGLES);
            drawWithColors(door, 5, gl.TRIANGLE_STRIP);
            drawWithColors(window1, 5, gl.TRIANGLE_STRIP);
        }

        function drawWithColors(data, stride, mode) {
            const buffer = createBuffer(data);
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            
            gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, stride * 4, 0);
            gl.enableVertexAttribArray(aPosition);
            
            gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, stride * 4, 2 * 4);
            gl.enableVertexAttribArray(aColor);
            
            gl.drawArrays(mode, 0, data.length / stride);
        }

        // Keyboard interaction
        document.addEventListener('keydown', (e) => {
            if (e.key === 'd' || e.key === 'D') {
                mode = 0; // Day
                drawScene();
            } else if (e.key === 'n' || e.key === 'N') {
                mode = 1; // Night
                drawScene();
            } else if (e.key === 's' || e.key === 'S') {
                mode = 2; // Sunset
                drawScene();
            }
        });

        // Initial draw
        drawScene();
    </script>
</body>
</html>
