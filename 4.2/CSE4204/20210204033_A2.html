<!DOCTYPE html>
<html>
<title>Assignment 1: Triangle Bird</title>

<body>
    <canvas id="webglCanvas" height="500" width="500">
    </canvas>
    <script>
        var canvas = document.getElementById("webglCanvas");
        var gl = canvas.getContext("webgl");

        gl.clearColor(0.8, 0.89, 1, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);

        var vertexShaderSource = 'attribute vec3 a_coords; void main() { gl_Position = vec4(a_coords,1.0);}';

        var fragmentShaderSource = 'void main() { gl_FragColor = vec4(0.0,0.35,1.0,1);}';

        var vsh = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vsh, vertexShaderSource);
        gl.compileShader(vsh);

        var fsh = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fsh, fragmentShaderSource);
        gl.compileShader(fsh);

        var prog = gl.createProgram();
        gl.attachShader(prog, vsh);
        gl.attachShader(prog, fsh);
        gl.linkProgram(prog);
        gl.useProgram(prog);

        var a_coords_location = gl.getAttribLocation(prog, "a_coords");
        var coords = new Float32Array([
        -0.37, 0.21, 0.00,
        -0.48, 0.10, 0.00,
        -0.31, 0.08, 0.00,

        -0.36, 0.22, 0.00,
        -0.24, -0.002, 0.00,
        -0.12, 0.122, 0.00,

        -0.24, -0.03, 0.00,
         0.25, -0.03, 0.00,
         0.01, 0.22, 0.00,

         0.01, 0.244, 0.00,
         0.25, 0, 0.00,
         0.49, 0.34, 0.00,

        -0.24, -0.04, 0.00,
         0.19, -0.21, 0.00,
         0.25, -0.04, 0.00,

         0.27, -0.038, 0.00,
         0.204, -0.22, 0.00,
         0.49, -0.33, 0.00

        ]
        );
        var a_coords_buffer = gl.createBuffer();

        gl.bindBuffer(gl.ARRAY_BUFFER, a_coords_buffer);
        gl.bufferData(gl.ARRAY_BUFFER, coords, gl.STATIC_DRAW);
        gl.vertexAttribPointer(a_coords_location, 3, gl.FLOAT, false, 0, 0);
        gl.enableVertexAttribArray(a_coords_location);
        gl.drawArrays(gl.TRIANGLES, 0, 18);

    </script>
</body>

</html>
