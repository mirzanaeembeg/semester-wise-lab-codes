<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reading Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: fixed; top: 10px; left: 10px; color: white;
      font: 13px/1.6 monospace; background: rgba(0,0,0,0.5);
      padding: 8px 12px; border-radius: 6px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">
    W/A/S/D or Arrow keys — move camera<br>
    Click on table — swap texture
  </div>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
